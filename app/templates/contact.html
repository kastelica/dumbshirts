{% extends "base.html" %}
{% block title %}Contact Us | Dumbshirts.store{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Contact Us</h1>
<p class="text-gray-400 mb-4">Have a question about an order or a product? Send us a message.</p>

<form id="contactForm" method="post" action="/contact" class="max-w-lg space-y-3">
  <div>
    <label class="block text-sm mb-1">Your name</label>
    <input type="text" name="name" class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-100" placeholder="Jane Doe">
  </div>
  <div>
    <label class="block text-sm mb-1">Your email</label>
    <input type="email" name="email" required class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-100" placeholder="you@example.com">
  </div>
  <div>
    <label class="block text-sm mb-1">Subject</label>
    <input type="text" name="subject" class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-100" placeholder="How can we help?">
  </div>
  <div>
    <label class="block text-sm mb-1">Message</label>
    <textarea name="message" rows="6" required class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-100" placeholder="Write your message..."></textarea>
  </div>
  <button class="bg-white text-black px-4 py-2 rounded">Send</button>
</form>
<p id="contactStatus" class="mt-3 text-sm text-gray-300" style="display:none;"></p>

<script>
(function(){
  var form = document.getElementById('contactForm');
  var statusEl = document.getElementById('contactStatus');
  if (!form) return;
  form.addEventListener('submit', function(e){
    e.preventDefault();
    var btn = form.querySelector('button');
    if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
    fetch(form.action, {
      method: 'POST',
      headers: { 'Accept': 'text/html', 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(new FormData(form))
    }).then(function(res){
      if (res.ok) {
        form.reset();
        statusEl.textContent = 'Thanks! Your message has been sent.';
        statusEl.style.display = '';
      } else {
        statusEl.textContent = 'Sorry, there was a problem sending your message.';
        statusEl.style.display = '';
      }
    }).catch(function(){
      statusEl.textContent = 'Network error. Please try again.';
      statusEl.style.display = '';
    }).finally(function(){
      if (btn) { btn.disabled = false; btn.textContent = 'Send'; }
    });
  });
})();
</script>
{% endblock %}
