{% extends "base.html" %}
{% block title %}Contact Us | Dumbshirts.store{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Contact Us</h1>
<p class="text-gray-400 mb-4">Have a question about an order or a product? Send us a message.</p>

<form method="post" action="{{ current_app.config.get('FORMSPREE_ENDPOINT', '') }}" class="max-w-lg space-y-3">
  <div>
    <label class="block text-sm mb-1">Your email</label>
    <input type="email" name="email" required class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-100" placeholder="you@example.com">
  </div>
  <div>
    <label class="block text-sm mb-1">Subject</label>
    <input type="text" name="subject" class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-100" placeholder="How can we help?">
  </div>
  <div>
    <label class="block text-sm mb-1">Message</label>
    <textarea name="message" rows="6" required class="w-full bg-gray-900 border border-gray-800 rounded px-3 py-2 text-gray-100" placeholder="Write your message..."></textarea>
  </div>
  <button class="bg-white text-black px-4 py-2 rounded">Send</button>
</form>
{% endblock %}
