{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Tracked Trends</h1>
<div class="border border-gray-800 rounded overflow-hidden">
	<table class="w-full text-sm">
		<thead class="bg-gray-900 text-gray-400">
			<tr>
				<th class="p-2 text-left">Created</th>
				<th class="p-2 text-left">Trend</th>
				<th class="p-2 text-left">Slug</th>
				<th class="p-2 text-left">Actions</th>
			</tr>
		</thead>
		<tbody>
			{% for t in trends %}
			<tr class="border-t border-gray-800">
				<td class="p-2 text-gray-400">{{ t.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
				<td class="p-2">{{ t.term }}</td>
				<td class="p-2"><a class="underline" href="/trends/{{ t.slug }}">/{{ t.slug }}</a></td>
				<td class="p-2">
					<form method="post" action="{{ url_for('admin.create_tshirt_from_trend', trend_id=t.id) }}" class="inline">
						<button class="bg-white text-black px-3 py-1 rounded">Create T‑shirt</button>
					</form>
				</td>
			</tr>
			{% else %}
			<tr><td colspan="4" class="p-3 text-gray-400">No trends yet.</td></tr>
			{% endfor %}
		</tbody>
	</table>
</div>
{% endblock %}
